<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 20" width="60" height="20">
  <circle cx="10" cy="10" r="4" fill="#B4A59C">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;3;4" dur="1.2s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="30" cy="10" r="4" fill="#B4A59C">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;3;4" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="10" r="4" fill="#B4A59C">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;3;4" dur="1.2s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
</svg>