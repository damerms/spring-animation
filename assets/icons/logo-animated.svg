<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <title>Spring AI - Animated Logo</title>
  <g style="transform-origin: 24px 24px">
    <animateTransform attributeName="transform" type="rotate"
      from="0 24 24" to="360 24 24" dur="8s" repeatCount="indefinite"/>
    <ellipse cx="24" cy="12" rx="5" ry="8" fill="#FFB0B8"/>
    <ellipse cx="24" cy="12" rx="5" ry="8" fill="#FFBE82" transform="rotate(60 24 24)"/>
    <ellipse cx="24" cy="12" rx="5" ry="8" fill="#B4DCA0" transform="rotate(120 24 24)"/>
    <ellipse cx="24" cy="12" rx="5" ry="8" fill="#82BEF0" transform="rotate(180 24 24)"/>
    <ellipse cx="24" cy="12" rx="5" ry="8" fill="#C8A0F0" transform="rotate(240 24 24)"/>
    <ellipse cx="24" cy="12" rx="5" ry="8" fill="#FFC882" transform="rotate(300 24 24)"/>
  </g>
  <circle cx="24" cy="24" r="6" fill="#F5C850">
    <animate attributeName="r" values="5.5;6.5;5.5" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>