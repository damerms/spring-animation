<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Spring AI — Bloom v1. A seasonal AI prompt interface." />
  <title>Spring AI — Bloom v1</title>
  <link rel="icon" type="image/svg+xml" href="../icons/favicon-32.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════ -->
  <!--  APP SHELL                              -->
  <!-- ═══════════════════════════════════════ -->
  <div class="app" id="app" aria-label="Spring AI chat interface">

    <!-- TOP NAV -->
    <header class="topbar" role="banner">
      <div class="topbar__brand">
        <img class="topbar__logo" src="../icons/logo.svg" alt="Spring AI logo" width="28" height="28" />
        <span class="topbar__name">Spring <span class="topbar__name--light">AI</span></span>
      </div>

      <div class="topbar__model">
        <button class="model-pill" aria-label="Select model" aria-haspopup="listbox">
          Bloom v1
          <img class="model-pill__chevron" src="../icons/icon-chevron-down.svg" alt="" width="12" height="12" />
        </button>
      </div>
    </header>

    <!-- MAIN CHAT -->
    <main class="chat" role="main" id="chat-main">

      <!-- WELCOME STATE (shown when no messages) -->
      <section class="welcome" id="welcome-screen" aria-live="polite">
        <img class="welcome__logo" src="../icons/logo-animated.svg" alt="Spring AI animated logo" width="64" height="64" />
        <h1 class="welcome__headline">Hello Spring! <span class="welcome__emoji" aria-hidden="true">🌸</span></h1>
        <p class="welcome__sub">Ask me anything…</p>
        <span class="welcome__cursor" aria-hidden="true"></span>
      </section>

      <!-- MESSAGES LIST -->
      <ol class="messages" id="messages-list" aria-label="Chat messages" aria-live="polite" aria-relevant="additions">
        <!-- Messages injected by JS -->
      </ol>

    </main>

    <!-- INPUT BAR -->
    <footer class="inputbar" role="contentinfo">
      <form class="inputbar__form" id="chat-form" autocomplete="off" novalidate>

        <button type="button" class="inputbar__attach" aria-label="Attach file">
          <img src="../icons/icon-attach.svg" alt="" width="22" height="22" />
        </button>

        <div class="inputbar__divider" aria-hidden="true"></div>

        <label class="sr-only" for="chat-input">Message Spring AI</label>
        <textarea
          class="inputbar__input"
          id="chat-input"
          name="message"
          placeholder="Ask me anything…"
          rows="1"
          maxlength="2000"
          aria-multiline="true"
        ></textarea>

        <button type="button" class="inputbar__mic" aria-label="Voice input">
          <img src="../icons/icon-mic.svg" alt="" width="22" height="22" />
        </button>

        <button type="submit" class="inputbar__send" id="send-btn" aria-label="Send message" disabled>
          <img src="../icons/icon-send.svg" alt="" width="36" height="36" />
        </button>

      </form>
      <p class="inputbar__hint">Spring AI · Bloom v1 · Seasonal Edition 🌸</p>
    </footer>

  </div>

  <!-- MESSAGE TEMPLATES (cloned by JS) -->
  <template id="tpl-user-message">
    <li class="message message--user" role="listitem">
      <div class="message__bubble">
        <p class="message__text"></p>
      </div>
      <time class="message__time" datetime=""></time>
    </li>
  </template>

  <template id="tpl-ai-message">
    <li class="message message--ai" role="listitem">
      <div class="message__avatar" aria-hidden="true">
        <img src="../icons/logo.svg" alt="" width="28" height="28" />
      </div>
      <div class="message__body">
        <div class="message__header">
          <span class="message__sender">Spring AI</span>
          <time class="message__time" datetime=""></time>
        </div>
        <div class="message__bubble">
          <p class="message__text"></p>
        </div>
        <div class="message__actions" aria-label="Message actions">
          <button class="message__action" aria-label="Copy message">Copy</button>
          <button class="message__action" aria-label="Retry">Retry</button>
        </div>
      </div>
    </li>
  </template>

  <template id="tpl-thinking">
    <li class="message message--ai message--thinking" role="listitem" aria-label="Spring AI is thinking">
      <div class="message__avatar" aria-hidden="true">
        <img src="../icons/logo-animated.svg" alt="" width="28" height="28" />
      </div>
      <div class="message__body">
        <span class="message__sender">Spring AI</span>
        <div class="thinking-dots" aria-hidden="true">
          <span class="thinking-dots__dot"></span>
          <span class="thinking-dots__dot"></span>
          <span class="thinking-dots__dot"></span>
        </div>
      </div>
    </li>
  </template>

  <template id="tpl-status">
    <li class="status-message" role="status" aria-live="polite">
      <span class="status-message__icon"></span>
      <span class="status-message__text"></span>
    </li>
  </template>

  <script src="app.js"></script>
</body>
</html>
